basePath: /api/v1
definitions:
  domain.ChatbotApproval:
    properties:
      args_json:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      decided_at:
        type: string
      decided_by:
        type: string
      execution_error:
        type: string
      id:
        type: string
      idempotency_key:
        type: string
      method:
        type: string
      path:
        type: string
      request_id:
        type: string
      requested_by:
        type: string
      result_snapshot_id:
        type: string
      risk_summary:
        type: string
      side_effect_level:
        type: string
      status:
        description: PENDING, APPROVED, REJECTED, EXECUTED, EXPIRED, FAILED
        type: string
      tool_name:
        type: string
      turn_audit_id:
        type: string
    type: object
  domain.Formula:
    properties:
      createdAt:
        type: string
      effectiveFrom:
        type: string
      effectiveTo:
        type: string
      formulaID:
        type: string
      formulaName:
        type: string
      instructions:
        type: string
      safetyNotes:
        type: string
      version:
        type: integer
    type: object
  domain.FormulaIngredients:
    properties:
      component_type:
        type: string
      formula_id:
        type: string
      ingredient_id:
        type: string
      lead_time_hours:
        description: 0 = instant
        type: integer
      material_id:
        type: string
      percentage:
        type: number
      product_id:
        type: string
      quantity_per_unit:
        type: number
      scrap_rate:
        type: number
      source:
        description: '"make" | "buy"'
        type: string
      unit:
        type: string
    type: object
  domain.InventoryExpectedArrival:
    properties:
      arrivalID:
        type: string
      createdAt:
        type: string
      expectedArriveAt:
        type: string
      materialID:
        type: string
      notes:
        type: string
      quantity:
        type: number
      receivedAt:
        type: string
      referenceJobID:
        type: string
      status:
        enum:
        - pending
        - received
        - cancelled
        type: string
    type: object
  domain.InventoryMaterials:
    properties:
      currentStock:
        type: number
      lastUpdated:
        type: string
      materialID:
        type: string
      materialName:
        type: string
      minStock:
        type: number
      reorderLevel:
        type: number
      status:
        enum:
        - in_stock
        - low_stock
        - out_of_stock
        type: string
      storageLocation:
        type: string
      unit:
        type: string
    type: object
  domain.InventoryReservation:
    properties:
      createdAt:
        type: string
      jobID:
        type: string
      jobStepID:
        type: string
      materialID:
        type: string
      neededAt:
        type: string
      reservationID:
        type: string
      reservedQty:
        type: number
      status:
        enum:
        - pending
        - consumed
        - released
        type: string
      updatedAt:
        type: string
    type: object
  domain.Job:
    properties:
      created_at:
        type: string
      deadline:
        type: string
      deadline_status:
        $ref: '#/definitions/domain.JobDeadlineStatus'
      job_id:
        type: string
      notes:
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        - urgent
        type: string
      product_id:
        type: string
      quantity_completed:
        type: integer
      quantity_total:
        type: integer
      status:
        enum:
        - planned
        - scheduled
        - running
        - blocked
        - paused
        - completed
        - cancelled
        type: string
      updated_at:
        type: string
    type: object
  domain.JobDeadlineStatus:
    properties:
      is_late:
        type: boolean
      late_by:
        description: 'human-readable: "2 days", "4 hours", "on time"'
        type: string
    type: object
  domain.JobStepScheduleSlots:
    properties:
      actual_end:
        type: string
      actual_start:
        type: string
      allocation_percent:
        type: number
      batch_sequence:
        type: integer
      buffer_time_minutes:
        type: integer
      changeover_time_minutes:
        type: integer
      cleaning_time_minutes:
        type: integer
      is_parallel:
        type: boolean
      job_step_id:
        type: string
      machine_id:
        type: string
      preparation_time_minutes:
        type: integer
      processing_time_minutes:
        type: integer
      proposal_id:
        type: string
      quantity_planned:
        type: integer
      scheduled_end:
        type: string
      scheduled_start:
        type: string
      slot_id:
        type: string
      split_group_id:
        type: string
      status:
        enum:
        - planned
        - running
        - completed
        - cancelled
        - paused
        type: string
    type: object
  domain.JobSteps:
    properties:
      job_id:
        type: string
      job_step_id:
        type: string
      quantity_completed:
        type: integer
      quantity_target:
        type: integer
      status:
        enum:
        - pending
        - scheduled
        - running
        - blocked
        - completed
        type: string
      step_id:
        type: string
      step_sequence:
        type: integer
    type: object
  domain.Machine:
    properties:
      capacityPerHour:
        type: integer
      defaultChangeoverTime:
        type: integer
      defaultCleaningTime:
        type: integer
      defaultSetupTime:
        type: integer
      lastMaintenanceDate:
        type: string
      location:
        type: string
      machineID:
        type: string
      machineName:
        type: string
      machineType:
        description: CNC / Press / Coating etc
        type: string
      maintenanceIntervalDays:
        type: integer
      status:
        enum:
        - idle
        - running
        - maintenance
        - offline
        type: string
      utilizationRate:
        type: number
    type: object
  domain.MachineCapabilities:
    properties:
      capabilityID:
        type: string
      efficiencyFactor:
        description: speed modifier for this step
        type: number
      machineID:
        type: string
      stepID:
        type: string
    type: object
  domain.MachineDowntime:
    properties:
      cause:
        type: string
      downtimeID:
        type: string
      durationMinutes:
        type: integer
      endTime:
        type: string
      jobStepSlotID:
        type: string
      machineID:
        type: string
      startTime:
        type: string
    type: object
  domain.MaintenanceRecords:
    properties:
      description:
        type: string
      endTime:
        type: string
      machineID:
        type: string
      maintenanceID:
        type: string
      maintenanceType:
        type: string
      startTime:
        type: string
      technician:
        type: string
    type: object
  domain.ProcessStepMaterial:
    properties:
      id:
        type: string
      materialID:
        type: string
      productID:
        type: string
      quantityPerUnit:
        type: number
      role:
        description: input | output
        type: string
      stepID:
        type: string
      unit:
        type: string
    type: object
  domain.ProcessSteps:
    properties:
      allow_parallel_execution:
        type: boolean
      batch_size:
        description: 0 = no batch constraint
        type: integer
      default_changeover_time:
        description: minutes
        type: integer
      default_cleaning_time:
        description: minutes
        type: integer
      default_preparation_time:
        description: minutes
        type: integer
      default_processing_time:
        description: minutes
        type: integer
      is_batch_process:
        description: true if step runs in batches
        type: boolean
      machine_type_required:
        type: string
      max_parallel_machines:
        type: integer
      min_batch_size:
        description: minimum batch when splitting
        type: integer
      min_split_qty:
        type: integer
      min_wait_minutes:
        description: e.g. cooling time before next step
        type: integer
      notes:
        type: string
      predecessor_step_ids:
        description: JSON array of step_ids; empty = infer from StepSequence
        type: string
      process_id:
        type: string
      quality_check_required:
        type: boolean
      step_id:
        type: string
      step_name:
        type: string
      step_sequence:
        type: integer
      step_type:
        description: matches reference_step_types.name
        type: string
      transfer_batch_size:
        type: integer
      transfer_minutes:
        description: transport time to next step
        type: integer
    type: object
  domain.Product:
    properties:
      createdAt:
        type: string
      description:
        type: string
      formulaID:
        description: linked formula for BOM/recipe
        type: string
      processID:
        description: active routing for scheduling
        type: string
      productID:
        type: string
      productName:
        type: string
      productType:
        type: string
      status:
        description: active, obsolete
        enum:
        - active
        - obsolete
        type: string
      unitOfMeasure:
        description: pcs / kg / liter
        type: string
    type: object
  domain.ProductBOM:
    properties:
      bomid:
        type: string
      componentType:
        type: string
      materialID:
        type: string
      productComponentID:
        description: sub-product
        type: string
      productID:
        type: string
      quantityRequired:
        description: qty per 1 unit of parent
        type: number
      scrapRate:
        type: number
      unit:
        type: string
    type: object
  domain.ProductInventory:
    properties:
      availableFrom:
        type: string
      inventoryID:
        type: string
      lastUpdated:
        type: string
      productID:
        type: string
      quantityOnHand:
        type: number
      quantityReserved:
        type: number
      status:
        enum:
        - available
        - reserved
        - blocked
        - planned
        type: string
      storageLocation:
        type: string
    type: object
  domain.ProductProcess:
    properties:
      description:
        type: string
      effectiveFrom:
        type: string
      effectiveTo:
        type: string
      isPrimary:
        description: primary vs alternative routing
        type: boolean
      processID:
        type: string
      processName:
        type: string
      productID:
        type: string
      sequence:
        description: order when multiple (0=primary)
        type: integer
      version:
        type: integer
    type: object
  domain.ProductionLogs:
    properties:
      downtimeMinutes:
        description: Gap 7 - downtime during slot for OEE
        type: integer
      endTime:
        type: string
      operatorNotes:
        type: string
      productionID:
        type: string
      quantityProduced:
        type: integer
      quantityScrap:
        type: integer
      slotID:
        type: string
      startTime:
        type: string
    type: object
  domain.QualityInspectionRecords:
    properties:
      defectCount:
        type: integer
      inspectionID:
        type: string
      inspectionTime:
        type: string
      inspectorName:
        type: string
      jobStepID:
        type: string
      notes:
        type: string
      result:
        description: pass, fail
        type: string
    type: object
  domain.ReferenceLocation:
    properties:
      bay:
        type: string
      display:
        description: computed in app
        type: string
      id:
        type: integer
      zone:
        type: string
    type: object
  domain.ReferenceMachineType:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ReferenceProductType:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ReferenceStepType:
    properties:
      default_machine_type:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  domain.ReferenceStorageLocation:
    properties:
      id:
        type: integer
      name:
        type: string
      type:
        description: shelf, rack, cold, hazardous, floor, dock
        type: string
    type: object
  dto.AIApprovalRef:
    properties:
      approve_call:
        $ref: '#/definitions/dto.AISuggestedCall'
      id:
        type: string
      reject_call:
        $ref: '#/definitions/dto.AISuggestedCall'
      risk_summary:
        type: string
      side_effect_level:
        type: string
      tool_name:
        type: string
    type: object
  dto.AICommandResponse:
    properties:
      action:
        type: string
      ambiguous:
        type: boolean
      approval_request:
        additionalProperties: true
        type: object
      bdi_result:
        $ref: '#/definitions/dto.BDIResult'
      clarifications:
        items:
          type: string
        type: array
      confidence:
        type: number
      debug_payload:
        additionalProperties: true
        type: object
      entities:
        additionalProperties: true
        type: object
      executed:
        type: boolean
      executed_call:
        $ref: '#/definitions/dto.AISuggestedCall'
      executed_calls:
        items:
          $ref: '#/definitions/dto.AISuggestedCall'
        type: array
      execution_mode:
        type: string
      form_request:
        additionalProperties: true
        type: object
      guidance:
        items:
          type: string
        type: array
      human_message:
        type: string
      insights: {}
      intent:
        type: string
      message:
        type: string
      message_kind:
        type: string
      pending_approvals:
        items:
          $ref: '#/definitions/dto.AIApprovalRef'
        type: array
      result_cards:
        items:
          $ref: '#/definitions/dto.AIResultCard'
        type: array
      sources:
        items:
          $ref: '#/definitions/dto.AISourceRef'
        type: array
      status_label:
        type: string
      suggested_calls:
        items:
          $ref: '#/definitions/dto.AISuggestedCall'
        type: array
      turn_id:
        type: string
      ui_blocks:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  dto.AIResultCard:
    properties:
      actions:
        items:
          $ref: '#/definitions/dto.AISuggestedCall'
        type: array
      bullets:
        items:
          type: string
        type: array
      kind:
        type: string
      metrics:
        items:
          $ref: '#/definitions/dto.AIResultMetric'
        type: array
      summary:
        type: string
      title:
        type: string
      tone:
        type: string
    type: object
  dto.AIResultMetric:
    properties:
      label:
        type: string
      value:
        type: string
    type: object
  dto.AISourceRef:
    properties:
      description:
        type: string
      kind:
        type: string
      name:
        type: string
      path:
        type: string
      read_only:
        type: boolean
    type: object
  dto.AISuggestedCall:
    properties:
      body:
        additionalProperties: true
        type: object
      method:
        type: string
      path:
        type: string
      purpose:
        type: string
      requires_approval:
        type: boolean
      ui:
        $ref: '#/definitions/dto.AISuggestedCallUI'
    type: object
  dto.AISuggestedCallUI:
    properties:
      display:
        description: primary | secondary | hidden_if_result_card_exists
        type: string
      priority:
        description: high | normal | low
        type: string
    type: object
  dto.AddFormulaIngredientRequest:
    properties:
      material_id:
        description: required if product_id not set
        type: string
      percentage:
        type: number
      product_id:
        description: required if material_id not set (sub-product)
        type: string
      quantity:
        description: backward compat, maps to quantity_per_unit
        type: number
      quantity_per_unit:
        description: required; qty per 1 unit of parent
        type: number
      scrap_rate:
        description: 0-1
        type: number
      unit:
        type: string
    type: object
  dto.AddProcessStepMaterialRequest:
    properties:
      material_id:
        description: required if product_id not set
        type: string
      product_id:
        description: required if material_id not set
        type: string
      quantity_per_unit:
        description: required
        type: number
      role:
        description: '"input" or "output"'
        type: string
      unit:
        type: string
    type: object
  dto.ApplyReplenishmentBatchRequest:
    properties:
      arrivals:
        items:
          $ref: '#/definitions/dto.ReplenishmentArrivalItem'
        type: array
      suggestions:
        items:
          $ref: '#/definitions/dto.ReplenishmentArrivalItem'
        type: array
    type: object
  dto.AssignCapabilityRequest:
    properties:
      efficiency_factor:
        type: number
      step_id:
        type: string
    required:
    - step_id
    type: object
  dto.BDIBeliefs:
    properties:
      entities:
        additionalProperties: true
        type: object
      resource:
        type: string
    type: object
  dto.BDIDesire:
    properties:
      confidence:
        type: number
      intent:
        type: string
    type: object
  dto.BDIExecutableCall:
    properties:
      body:
        additionalProperties: true
        type: object
      method:
        type: string
      path:
        type: string
      purpose:
        type: string
      requires_approval:
        type: boolean
    type: object
  dto.BDIIntention:
    properties:
      action:
        type: string
      executable_calls:
        items:
          $ref: '#/definitions/dto.BDIExecutableCall'
        type: array
    type: object
  dto.BDIResult:
    properties:
      beliefs:
        $ref: '#/definitions/dto.BDIBeliefs'
      desire:
        $ref: '#/definitions/dto.BDIDesire'
      intention:
        $ref: '#/definitions/dto.BDIIntention'
    type: object
  dto.BOMItem:
    properties:
      material_id:
        description: required if product_id not set
        type: string
      product_id:
        description: sub-product, required if material_id not set
        type: string
      quantity_per_unit:
        description: required; qty per 1 unit of parent
        type: number
      quantity_required:
        description: backward compat
        type: number
      scrap_rate:
        type: number
      unit:
        type: string
    type: object
  dto.BatchProposalsRequest:
    properties:
      include_inventory_actions:
        type: boolean
      job_ids:
        description: explicit job IDs; if empty and Scope set, use scope
        items:
          type: string
        type: array
      order_by:
        description: '"edd" | "epo" | "fifo" (default: "epo")'
        type: string
      scope:
        description: '"all_unscheduled" = all jobs with status planned/scheduled and
          no active slots'
        type: string
    type: object
  dto.ConsumeMaterialRequest:
    properties:
      material_id:
        type: string
      quantity:
        type: number
      reference_job_id:
        type: string
      slot_id:
        type: string
    required:
    - material_id
    - quantity
    type: object
  dto.CreateFormulaRequest:
    properties:
      formula_id:
        type: string
      formula_name:
        type: string
      instructions:
        type: string
      safety_notes:
        type: string
      version:
        type: integer
    required:
    - formula_id
    - formula_name
    type: object
  dto.CreateInventoryReservationRequest:
    properties:
      job_id:
        type: string
      job_step_id:
        type: string
      material_id:
        type: string
      needed_at:
        type: string
      reserved_qty:
        type: number
    required:
    - material_id
    - reserved_qty
    type: object
  dto.CreateJobRequest:
    properties:
      deadline:
        description: RFC3339
        type: string
      notes:
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        - urgent
        type: string
      product_id:
        type: string
      quantity_total:
        type: integer
      slots:
        description: optional split slots
        items:
          $ref: '#/definitions/dto.CreateSlotRequest'
        type: array
    required:
    - product_id
    - quantity_total
    type: object
  dto.CreateJobStepsRequest:
    properties:
      job_id:
        type: string
    required:
    - job_id
    type: object
  dto.CreateLocationRequest:
    properties:
      bay:
        type: string
      zone:
        type: string
    required:
    - zone
    type: object
  dto.CreateMachineRequest:
    properties:
      capacity_per_hour:
        type: integer
      default_changeover_time:
        type: integer
      default_cleaning_time:
        type: integer
      default_setup_time:
        type: integer
      location:
        type: string
      machine_id:
        type: string
      machine_name:
        type: string
      machine_type:
        type: string
      maintenance_interval_days:
        type: integer
    required:
    - machine_id
    - machine_name
    - machine_type
    type: object
  dto.CreateMachineTypeRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateMaterialRequest:
    properties:
      current_stock:
        type: number
      material_id:
        type: string
      material_name:
        type: string
      min_stock:
        type: number
      reorder_level:
        type: number
      storage_location:
        type: string
      unit:
        type: string
    required:
    - material_id
    - material_name
    type: object
  dto.CreateProcessRequest:
    properties:
      description:
        type: string
      process_id:
        type: string
      process_name:
        type: string
      product_id:
        type: string
      version:
        type: integer
    required:
    - process_id
    - process_name
    - product_id
    type: object
  dto.CreateProcessStepRequest:
    properties:
      allow_parallel_execution:
        type: boolean
      default_changeover_time:
        type: integer
      default_cleaning_time:
        type: integer
      default_preparation_time:
        type: integer
      default_processing_time:
        type: integer
      machine_type_required:
        type: string
      max_parallel_machines:
        type: integer
      min_split_qty:
        type: integer
      notes:
        type: string
      quality_check_required:
        type: boolean
      step_id:
        type: string
      step_name:
        type: string
      step_sequence:
        type: integer
      step_type:
        type: string
      transfer_batch_size:
        type: integer
    required:
    - step_name
    type: object
  dto.CreateProductInventoryRequest:
    properties:
      available_from:
        type: string
      product_id:
        type: string
      quantity_on_hand:
        minimum: 0
        type: number
      quantity_reserved:
        type: number
      status:
        enum:
        - available
        - reserved
        - blocked
        - planned
        type: string
      storage_location:
        type: string
    required:
    - product_id
    - quantity_on_hand
    type: object
  dto.CreateProductRequest:
    properties:
      description:
        type: string
      formula_id:
        type: string
      process_id:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      product_type:
        type: string
      unit_of_measure:
        type: string
    required:
    - product_id
    - product_name
    type: object
  dto.CreateProductTypeRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateSlotRequest:
    properties:
      allocation_percent:
        type: number
      batch_sequence:
        type: integer
      buffer_mins:
        type: integer
      cleaning_mins:
        type: integer
      duration_mins:
        type: integer
      is_parallel:
        type: boolean
      job_step_id:
        description: optional, for split
        type: string
      machine_id:
        type: string
      prep_mins:
        type: integer
      processing_mins:
        type: integer
      proposal_id:
        type: string
      quantity:
        type: integer
      split_group_id:
        type: string
      start_time:
        description: RFC3339
        type: string
